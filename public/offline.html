<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#030A0A" />
    <title>TOOLDECK — Offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        padding: 24px;
        text-align: center;
        background: #030a0a;
        color: #9fbdb8;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      h1 { color: #eaf7f4; font-size: 22px; margin: 0; letter-spacing: -0.01em; }
      p { margin: 0; font-size: 14px; color: #6e8d89; max-width: 320px; line-height: 1.5; }
      .mark {
        width: 48px; height: 48px; border-radius: 10px;
        border: 1.5px solid #19e3c4; color: #19e3c4;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 20px;
        box-shadow: 0 0 18px rgba(25,227,196,0.35);
      }
    </style>
  </head>
  <body>
    <div class="mark">T</div>
    <h1>You’re offline</h1>
    <p>TOOLDECK needs a connection to read inventory data. Reconnect and reload.</p>
  </body>
</html>
